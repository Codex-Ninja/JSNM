<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTVMSS - CCTV Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cctv">
<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header"><h2>🛡️ CTVMSS</h2><p>Cable Security System</p></div>
        <div class="user-profile">
            <div class="user-avatar" id="userAvatar">A</div>
            <div class="user-info"><h4 id="userName">Admin</h4><span id="userRole">Administrator</span></div>
        </div>
        <ul class="sidebar-nav">
            <li><a href="dashboard.html"><span class="icon">📊</span> Dashboard</a></li>
            <li><a href="incidents.html"><span class="icon">🚨</span> Incidents</a></li>
            <li><a href="assets.html"><span class="icon">🔌</span> Assets</a></li>
            <li><a href="sensors.html"><span class="icon">📡</span> Sensors</a></li>
            <li><a href="maps.html"><span class="icon">🗺️</span> GPS Tracking</a></li>
            <li><a href="cctv.html" class="active"><span class="icon">📹</span> CCTV Monitoring</a></li>
            <li><a href="ai.html"><span class="icon">🤖</span> AI Analytics</a></li>
            <li><a href="reports.html"><span class="icon">📈</span> Reports</a></li>
            <li><a href="users.html"><span class="icon">👥</span> Users</a></li>
            <li><a href="settings.html"><span class="icon">⚙️</span> Settings</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="sos-button" onclick="triggerSOS()"><span>🚨</span> EMERGENCY SOS</button>
            <button class="btn btn-sm" style="width: 100%; margin-top: 10px; background: #374151; color: white;" onclick="logout()"><span>🚪</span> Logout</button>
        </div>
    </aside>
    <main class="main-content">
        <div class="top-bar"><h1>📹 CCTV Monitoring</h1></div>
        <div class="stats-grid" style="margin-bottom: 20px;">
            <div class="stat-card success"><div class="label">Online</div><div class="value">3</div></div>
            <div class="stat-card danger"><div class="label">Offline</div><div class="value">1</div></div>
            <div class="stat-card primary"><div class="label">Recording</div><div class="value">2</div></div>
            <div class="stat-card warning"><div class="label">Alerts</div><div class="value">1</div></div>
        </div>
        <div class="cctv-grid" id="cctvGrid"><div class="text-center" style="grid-column: 1/-1; padding: 40px;">Loading cameras...</div></div>
    </main>
</div>
<script src="js/app.js"></script>
</body>
</html>
